services:
  backend:
    build: 
      context: ./backend/
      dockerfile: Dockerfile.prod
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend/db.sqlite3:/backend/db.sqlite3
      # - /var/www/static:/var/www/static
    ports:
      - "8000:8000"
    env_file:
      - ./backend/backend/.env
    restart: always
    networks:
      compslidesnetwork:
        ipv4_address: 172.28.2.1
    
  frontend:
    build: 
      context: ./frontend/
      dockerfile: Dockerfile.prod
    command: npm run preview -- --host
    ports:
      - "8001:4173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: always
    networks:
      compslidesnetwork:
        ipv4_address: 172.28.2.2

networks:
  compslidesnetwork:
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
